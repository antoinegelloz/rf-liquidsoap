name: Pre-release
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pre-release:
    name: Pre-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build artifacts via Makefile
        run: |
          mkdir -p dist
          CLEAN_REF=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9]//g')
          make artifact VERSION="${CLEAN_REF}-${GITHUB_SHA:0:7}"
          ls -la dist
      - name: Create or update a draft pre-release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "${{ github.ref_name }}"
          draft: true
          prerelease: true
          files: |
            dist/*.zip
            dist/*.md5
